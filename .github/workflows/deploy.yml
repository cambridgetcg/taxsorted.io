name: Test, build and deploy

# Every push to main: run the tests, build the static site, and deploy it to the
# Cloudflare Pages project that owns taxsorted.io. Fully automatic.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      # Quality gate — the VAT engine's tests must pass before anything ships.
      - run: npm test

      - run: npm run build

      # Deploy only when the token secret is set (keeps CI green until then).
      - name: Check for deploy token
        id: token
        run: echo "present=${{ secrets.CLOUDFLARE_API_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        if: steps.token.outputs.present == 'true'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: cf4198e651bf3009877d49f688c9d88e
          workingDirectory: frontend
          command: pages deploy out --project-name=taxsorted --branch=main
