name: Test, build and deploy

# Every push to main: run the tests, build the static site, and deploy it to the
# Cloudflare Pages project that owns taxsorted.io. Fully automatic.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Used only to decide whether the deploy step can run (skips cleanly if unset).
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      # Quality gate — the VAT engine's tests must pass before anything ships.
      - run: npm test

      - run: npm run build

      - name: Deploy to Cloudflare Pages
        if: ${{ env.CF_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: cf4198e651bf3009877d49f688c9d88e
          workingDirectory: frontend
          command: pages deploy out --project-name=taxsorted --branch=main
