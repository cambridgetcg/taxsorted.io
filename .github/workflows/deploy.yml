name: Test, build and deploy

# Every push to main: run the tests, build the static site, and deploy it to the
# Cloudflare Pages project that owns taxsorted.io. Fully automatic.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: taxsorted-production-release
  cancel-in-progress: false

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      # Quality gate — every workspace's tests must pass before anything ships.
      - run: npm test

      - run: npm run typecheck

      - run: npm run validate:learn

      - run: npm audit --omit=dev --audit-level=high

      - run: npm run build

  # The API ships first. A failed or skipped API deploy must never leave a new
  # frontend pointing at an older API contract.
  deploy-api:
    runs-on: ubuntu-latest
    needs: test-build
    outputs:
      deployed: ${{ steps.fly.outputs.present }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Check for Fly token
        id: fly
        run: echo "present=${{ secrets.FLY_API_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.fly.outputs.present == 'true'

      - name: Capture the published public-funding change prefix
        if: steps.fly.outputs.present == 'true'
        run: |
          set -euo pipefail
          response="${RUNNER_TEMP}/public-funding-changes-before.json"
          prefix="${RUNNER_TEMP}/public-funding-change-prefix.json"
          status=$(curl --silent --show-error \
            --connect-timeout 10 --max-time 30 --retry 4 --retry-delay 2 --retry-all-errors \
            --header 'Cache-Control: no-cache' \
            --output "${response}" --write-out '%{http_code}' \
            'https://api.taxsorted.io/v1/public-funding/uk/changes?limit=100')
          case "${status}" in
            200)
              jq --exit-status \
                '.schema == "taxsorted.uk.public-funding.changes/1" and .page.hasMore == false and (.data | type == "array")' \
                "${response}" >/dev/null
              jq '.data' "${response}" >"${prefix}"
              ;;
            404)
              if git show HEAD^:api/src/routes/uk-public-funding.ts 2>/dev/null | \
                grep --quiet 'taxsorted.uk.public-funding.changes/1'
              then
                echo 'Published change feed disappeared after its first release; refusing to deploy.' >&2
                exit 1
              fi
              printf '[]\n' >"${prefix}"
              ;;
            *)
              echo "Could not capture published change feed (HTTP ${status}); refusing to deploy." >&2
              exit 1
              ;;
          esac

          candidate='research/uk/public-funding/data/uk-public-funding-release-history.json'
          jq --exit-status \
            'type == "array" and length <= 100' "${candidate}" >/dev/null
          jq --exit-status --slurpfile before "${prefix}" '
            ($before[0]) as $old |
            (length >= ($old | length)) and
            (.[0:($old | length)] == $old)
          ' "${candidate}" >/dev/null

      - name: Deploy api to Fly.io
        if: steps.fly.outputs.present == 'true'
        run: flyctl deploy -c api/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke-test the deployed public contracts
        if: steps.fly.outputs.present == 'true'
        run: |
          set -euo pipefail
          for path in \
            /v1/health \
            /agent.txt \
            /.well-known/agent.txt \
            /v1/wake \
            /openapi.json \
            /v1/open-data \
            /v1/charities/uk \
            /v1/charities/uk/manifest \
            /v1/charities/uk/sources \
            /v1/public-funding/uk \
            /v1/public-funding/uk/manifest \
            /v1/public-funding/uk/sources \
            /v1/public-funding/uk/changes \
            /v1/public-funding/uk/records/src-hmt-spending-review-2025
          do
            curl --fail --silent --show-error \
              --connect-timeout 10 --max-time 30 --retry-max-time 120 \
              --retry 12 --retry-delay 5 --retry-all-errors \
              --output /dev/null "https://api.taxsorted.io${path}"
          done

          api_agent_manifest=$(curl --fail --silent --show-error \
            --connect-timeout 10 --max-time 30 \
            https://api.taxsorted.io/agent.txt)
          api_well_known_manifest=$(curl --fail --silent --show-error \
            --connect-timeout 10 --max-time 30 \
            https://api.taxsorted.io/.well-known/agent.txt)
          test "${api_agent_manifest}" = "${api_well_known_manifest}"
          printf '%s\n' "${api_agent_manifest}" | \
            grep --fixed-strings --line-regexp 'schema-version: taxsorted.agent-manifest/1'
          api_manifest_content_type=$(curl --fail --silent --show-error --head \
            --connect-timeout 10 --max-time 30 \
            https://api.taxsorted.io/agent.txt | \
            awk 'tolower($1) == "content-type:" { print tolower($2); exit }')
          case "${api_manifest_content_type}" in
            text/plain*) ;;
            *)
              echo "API agent manifest has unexpected content type: ${api_manifest_content_type}" >&2
              exit 1
              ;;
          esac

          current_changes="${RUNNER_TEMP}/public-funding-changes-after.json"
          curl --fail --silent --show-error \
            --connect-timeout 10 --max-time 30 \
            --header 'Cache-Control: no-cache' \
            --output "${current_changes}" \
            'https://api.taxsorted.io/v1/public-funding/uk/changes?limit=100'
          jq --exit-status --slurpfile before \
            "${RUNNER_TEMP}/public-funding-change-prefix.json" '
              ($before[0]) as $old |
              (.page.hasMore == false) and
              ((.data | type) == "array") and
              ((.data | length) >= ($old | length)) and
              (.data[0:($old | length)] == $old)
            ' "${current_changes}" >/dev/null

          publication_status=$(curl --fail --silent --show-error \
            --connect-timeout 10 --max-time 30 \
            https://api.taxsorted.io/v1/charities/uk | \
            jq --raw-output '.publication.status')
          graph_status=$(curl --silent --show-error \
            --connect-timeout 10 --max-time 30 \
            --output /dev/null --write-out '%{http_code}' \
            https://api.taxsorted.io/v1/charities/uk/graph)
          case "${publication_status}:${graph_status}" in
            open:200|publication-review:503|emergency-stopped:503) ;;
            *)
              echo "Charity publication and graph disagree: ${publication_status}:${graph_status}" >&2
              exit 1
              ;;
          esac

          negotiated_wake_schema=$(curl --fail --silent --show-error \
            --connect-timeout 10 --max-time 30 \
            --header 'Accept: application/json' \
            https://api.taxsorted.io/ | jq --raw-output '.schema')
          test "${negotiated_wake_schema}" = 'taxsorted.agent-wake/1'

          public_funding_status=$(curl --fail --silent --show-error \
            --connect-timeout 10 --max-time 30 \
            https://api.taxsorted.io/v1/public-funding/uk | \
            jq --raw-output '.manifest.publicationStatus')
          public_funding_graph_status=$(curl --silent --show-error \
            --connect-timeout 10 --max-time 30 \
            --output /dev/null --write-out '%{http_code}' \
            https://api.taxsorted.io/v1/public-funding/uk/graph)
          case "${public_funding_status}:${public_funding_graph_status}" in
            open:200|publication-review:503|emergency-stopped:503) ;;
            *)
              echo "Public-funding publication and graph disagree: ${public_funding_status}:${public_funding_graph_status}" >&2
              exit 1
              ;;
          esac

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-api
    if: needs.deploy-api.outputs.deployed == 'true'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npm run build

      - name: Check for deploy token
        id: token
        run: echo "present=${{ secrets.CLOUDFLARE_API_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        if: steps.token.outputs.present == 'true'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: cf4198e651bf3009877d49f688c9d88e
          workingDirectory: frontend
          command: pages deploy out --project-name=taxsorted --branch=main

      - name: Smoke-test the deployed human and machine doors
        if: steps.token.outputs.present == 'true'
        run: |
          set -euo pipefail
          for path in /uk/public-funding /agent.txt /.well-known/agent.txt
          do
            curl --fail --silent --show-error \
              --location \
              --connect-timeout 10 --max-time 30 --retry-max-time 120 \
              --retry 12 --retry-delay 5 --retry-all-errors \
              --output /dev/null "https://taxsorted.io${path}"
          done

          frontend_agent_manifest=$(curl --fail --silent --show-error --location \
            --connect-timeout 10 --max-time 30 https://taxsorted.io/agent.txt)
          frontend_well_known_manifest=$(curl --fail --silent --show-error --location \
            --connect-timeout 10 --max-time 30 https://taxsorted.io/.well-known/agent.txt)
          api_agent_manifest=$(curl --fail --silent --show-error \
            --connect-timeout 10 --max-time 30 https://api.taxsorted.io/agent.txt)
          test "${frontend_agent_manifest}" = "${frontend_well_known_manifest}"
          test "${frontend_agent_manifest}" = "${api_agent_manifest}"
          printf '%s\n' "${frontend_agent_manifest}" | \
            grep --fixed-strings --line-regexp 'schema-version: taxsorted.agent-manifest/1'
          frontend_manifest_content_type=$(curl --fail --silent --show-error --head --location \
            --connect-timeout 10 --max-time 30 https://taxsorted.io/agent.txt | \
            awk 'tolower($1) == "content-type:" { value=tolower($2) } END { print value }')
          case "${frontend_manifest_content_type}" in
            text/plain*) ;;
            *)
              echo "Frontend agent manifest has unexpected content type: ${frontend_manifest_content_type}" >&2
              exit 1
              ;;
          esac

  # HMRC's own Test Fraud Prevention Headers API, sandbox only, checking the
  # exact header-assembly code path production uses (api/src/fraud.ts's
  # assembleFraudHeaders via api/scripts/validate-fraud-headers.ts). Runs
  # only when the HMRC credentials exist — same presence-gate pattern as the
  # deploy jobs, keeps CI green until they're added to this environment.
  validate-headers:
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Check for HMRC credentials
        id: hmrc
        run: echo "present=${{ secrets.HMRC_CLIENT_ID != '' && secrets.HMRC_CLIENT_SECRET != '' }}" >> "$GITHUB_OUTPUT"

      - name: Validate fraud-prevention headers against HMRC's Test API
        if: steps.hmrc.outputs.present == 'true'
        working-directory: api
        run: npm run validate:fraud-headers
        env:
          HMRC_CLIENT_ID: ${{ secrets.HMRC_CLIENT_ID }}
          HMRC_CLIENT_SECRET: ${{ secrets.HMRC_CLIENT_SECRET }}
          GOV_VENDOR_PUBLIC_IP: ${{ secrets.GOV_VENDOR_PUBLIC_IP }}
