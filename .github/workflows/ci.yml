name: Pull request checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: taxsorted-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm test
      - run: npm run lint --workspace frontend
      - run: npm run typecheck
      - run: npm run validate:learn
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run build
