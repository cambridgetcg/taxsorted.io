# taxsorted api — Fly.io, London (UK data residency).
# Deploy from the repo root: fly deploy -c api/fly.toml

app = "taxsorted-api"
primary_region = "lhr"

# Run `fly deploy -c api/fly.toml` from the repo root: the build context is the
# root (the api needs the engine workspace); this path is relative to this file.
[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"
  APP_ORIGIN = "https://taxsorted.io"
  API_ORIGIN = "https://api.taxsorted.io"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
