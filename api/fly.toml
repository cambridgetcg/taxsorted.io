# taxsorted api — Fly.io, London (UK data residency).
# Deploy from the repo root: fly deploy -c api/fly.toml

app = "taxsorted-api"
primary_region = "lhr"

# Run `fly deploy -c api/fly.toml` from the repo root: the build context is the
# root (the api needs the engine workspace); this path is relative to this file.
[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"
  APP_ORIGIN = "https://taxsorted.io"
  API_ORIGIN = "https://api.taxsorted.io"
  # The enabled charity corpus is sector-level only: official sources, legal
  # conditions, disclosure rules and help routes. It contains no mirrored
  # organisations, named people, personal contacts or inferred beliefs.
  UK_CHARITIES_PUBLIC_DATA_ENABLED = "true"
  # Public-funding bodies remain closed until the reviewed corpus passes the
  # release checks and a human explicitly enables the Fly secret. Sources,
  # gaps and release metadata remain readable while closed.
  # GOV_VENDOR_PUBLIC_IP is deliberately NOT set here: it's the public ingress
  # IP clients reach, not a build-time constant we'd know without asking Fly, and
  # this file is not the right place for a value that might need rotating.
  # Set it as a secret instead — see RUNBOOK.md "Fraud-prevention headers"
  # for how to fetch it (`fly ips list`) and apply it
  # (`fly secrets set -a taxsorted-api GOV_VENDOR_PUBLIC_IP=<ip>`); current
  # status lives in RUNBOOK.md §Fraud-prevention headers. Until
  # it's set, Gov-Vendor-Public-IP and Gov-Vendor-Forwarded are both omitted
  # (never sent malformed) — see api/src/fraud.ts.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/v1/health"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  # API startup materializes the complete public OpenAPI surface. Keep enough
  # headroom for cold starts and rolling deploys.
  memory = "512mb"
